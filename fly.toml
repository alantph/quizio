app = "app-delicate-dust-5401"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.socket"

[env]
  NODE_ENV = "production"
  WS_PORT = "3001"

[[services]]
  internal_port = 3001
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
